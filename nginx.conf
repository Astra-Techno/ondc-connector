# /etc/nginx/sites-available/ondc-connector
# Symlink: ln -s /etc/nginx/sites-available/ondc-connector /etc/nginx/sites-enabled/

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name ondc.cottkart.com;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name ondc.cottkart.com;

    # SSL — certbot fills these in automatically
    ssl_certificate     /etc/letsencrypt/live/ondc.cottkart.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ondc.cottkart.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Dashboard (Vue 3 static files)
    root /var/www/ondc-connector/dashboard/dist;
    index index.html;

    # Vue Router — serve index.html for all non-API routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API proxy
    location /api/ {
        proxy_pass         http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ONDC Gateway endpoints (root-level, no /api prefix)
    location ~ ^/(search|select|init|confirm|status|cancel|track|support|rating|issue|issue_status|update|on_search|on_select|on_init|on_confirm|on_status|on_cancel|on_track|on_update|on_support|on_rating|on_issue|on_issue_status|on_subscribe|health)$ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
